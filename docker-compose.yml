version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      - POSTGRES_USER=analiticsdashboarduser
      - POSTGRES_PASSWORD=analiticsdashboardpassword
      - POSTGRES_DB=analitics_dashboard_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "analiticsdashboarduser", "-d", "analitics_dashboard_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. BACKEND (Node.js)
  backend:
    build:
      context: ./backend
    container_name: js_backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=db       # Συνδέεται με το service "db" παραπάνω
      - DB_USER=analiticsdashboarduser
      - DB_PASSWORD=analiticsdashboardpassword
      - DB_NAME=analitics_dashboard_db
      - JWT_SECRET=my_super_secret_key_98765
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: react_frontend
    restart: always
    ports:
      - "80:80"     
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
